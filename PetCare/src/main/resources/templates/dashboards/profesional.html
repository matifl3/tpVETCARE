<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PetCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="dashboard">
        <h1>Panel de <span th:text="${rol == 'PASEADOR' ? 'Paseo' : rol == 'PELUQUERO' ? 'Peluquería' : rol == 'ADIESTRADOR' ? 'Adiestramiento' : 'Cuidado'}"></span></h1>
        <p th:if="${estadoProfesional == 'PENDIENTE'}" style="color:#e67e22;">Tu cuenta está pendiente de aprobación por un administrador.</p>
        <p th:if="${estadoProfesional == 'RECHAZADO'}" style="color:#e74c3c;">Tu solicitud fue rechazada.</p>
        <p th:if="${estadoProfesional == 'APROBADO'}">Bienvenido, <span th:text="${nombre}"></span>.</p>
        <div class="card-grid" th:if="${estadoProfesional == 'APROBADO'}">
            <div class="dash-card">
                <span class="dash-icon">📅</span>
                <h3>Mis Turnos</h3>
                <p>Gestioná tus turnos y disponibilidad.</p>
                <a th:href="@{/dashboard/mis-turnos}" class="dash-link">Ver turnos</a>
            </div>
            <div class="dash-card">
                <span class="dash-icon">🐾</span>
                <h3>Mascotas</h3>
                <p>Consultá las mascotas a tu cargo.</p>
                <a th:href="@{/dashboard/mis-pacientes}" class="dash-link">Ver mascotas</a>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
