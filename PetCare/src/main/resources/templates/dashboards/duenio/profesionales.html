<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesionales - PetCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="dashboard">
        <h1>Profesionales</h1>
        <p>Buscá profesionales y solicitá turnos para tus mascotas.</p>

        <div id="alerta" class="alert" role="alert"></div>

        <div style="display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap">
            <button class="btn-secondary" data-rol="" style="padding:10px 20px">Todos</button>
            <button class="btn-secondary" data-rol="VETERINARIO" style="padding:10px 20px">👨‍⚕️ Veterinarios</button>
            <button class="btn-secondary" data-rol="PASEADOR" style="padding:10px 20px">🐕 Paseadores</button>
            <button class="btn-secondary" data-rol="PELUQUERO" style="padding:10px 20px">✂️ Peluqueros</button>
            <button class="btn-secondary" data-rol="ADIESTRADOR" style="padding:10px 20px">🎯 Adiestradores</button>
            <button class="btn-secondary" data-rol="CUIDADOR" style="padding:10px 20px">🏠 Cuidadores</button>
        </div>

        <div id="listaProfesionales" class="card-grid">
            <p style="grid-column:1/-1;color:#888">Cargando...</p>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script th:inline="none">
        const alerta = document.getElementById('alerta');
        let profesionales = [];
        let mascotas = [];

        function mostrarAlerta(msg, tipo) {
            alerta.textContent = msg;
            alerta.className = 'alert ' + tipo + ' show';
            setTimeout(() => { alerta.className = 'alert'; }, 4000);
        }

        async function cargarProfesionales() {
            try {
                const res = await fetch('/api/profesionales');
                const data = await res.json();
                profesionales = Array.isArray(data) ? data.filter(p => p.activo && p.estado === 'APROBADO') : [];
            } catch { profesionales = []; }
        }

        async function cargarMascotas() {
            try {
                const res = await fetch('/api/mascotas/mias');
                const data = await res.json();
                mascotas = Array.isArray(data) ? data : [];
            } catch { mascotas = []; }
        }

        function renderizar(rol) {
            const div = document.getElementById('listaProfesionales');
            const filtrados = rol ? profesionales.filter(p => p.rol === rol) : profesionales;

            if (filtrados.length === 0) {
                div.innerHTML = '<p style="grid-column:1/-1;color:#888">No se encontraron profesionales.</p>';
                return;
            }

            div.innerHTML = filtrados.map(p => `
                <div class="dash-card">
                    <span class="dash-icon">${p.rol === 'VETERINARIO' ? '👨‍⚕️' : p.rol === 'PASEADOR' ? '🐕' : p.rol === 'PELUQUERO' ? '✂️' : p.rol === 'ADIESTRADOR' ? '🎯' : '🏠'}</span>
                    <h3>${p.nombre} ${p.apellido}</h3>
                    <p style="font-size:12px">${p.rol}</p>
                    <p style="font-size:13px;color:#888">${p.experiencia || ''}</p>
                    <button class="btn-primary" onclick="solicitarTurno(${p.id})" style="padding:8px 18px;font-size:13px;margin-top:8px">Solicitar turno</button>
                </div>
            `).join('');
        }

        function solicitarTurno(idProfesional) {
            if (mascotas.length === 0) {
                mostrarAlerta('Primero registrá una mascota.', 'alert-error');
                return;
            }
            window.location.href = '/dashboard/duenio/reservar/' + idProfesional;
        }

        document.querySelectorAll('[data-rol]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-rol]').forEach(b => b.style.borderColor = '#e8e8ef');
                this.style.borderColor = '#667eea';
                renderizar(this.dataset.rol);
            });
        });

        (async function init() {
            await Promise.all([cargarProfesionales(), cargarMascotas()]);
            renderizar('');
        })();
    </script>
</body>
</html>
