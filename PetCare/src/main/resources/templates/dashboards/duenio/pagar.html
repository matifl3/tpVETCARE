<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagar - PetCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .card-option { display:flex;align-items:center;gap:12px;padding:12px 16px;border:2px solid #e0e0e0;border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:8px }
        .card-option:hover { border-color:#302b63 }
        .card-option.selected { border-color:#302b63;background:#f0edff }
        .card-option input[type="radio"] { accent-color:#302b63;width:18px;height:18px;cursor:pointer }
        .section-title { font-size:14px;font-weight:600;color:#555;margin:20px 0 12px;text-transform:uppercase;letter-spacing:.5px }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="dashboard">
        <h1>Finalizar compra</h1>
        <p>Seleccioná una tarjeta para pagar o agregá una nueva.</p>

        <div id="alerta" class="alert" role="alert"></div>

        <div id="contenidoPago">
            <p style="color:#888">Cargando...</p>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script th:inline="none">
        const alerta = document.getElementById('alerta');

        function mostrarAlerta(msg, tipo) {
            alerta.textContent = msg;
            alerta.className = 'alert ' + tipo + ' show';
            setTimeout(() => { alerta.className = 'alert'; }, 4000);
        }

        const ROLE_ICONS = {
            VETERINARIO: '👨‍⚕️', PASEADOR: '🐕', PELUQUERO: '✂️', ADIESTRADOR: '🎯', CUIDADOR: '🏠'
        };

        let carritoData = null;
        let tarjetas = [];

        async function init() {
            const div = document.getElementById('contenidoPago');
            try {
                const [resCart, resCards] = await Promise.all([
                    fetch('/api/carrito'),
                    fetch('/api/tarjetas')
                ]);
                carritoData = await resCart.json();
                const cardsData = await resCards.json();
                tarjetas = Array.isArray(cardsData) ? cardsData : [];

                const items = carritoData.items || [];
                const turnos = carritoData.turnos || [];

                if (items.length === 0 && turnos.length === 0) {
                    div.innerHTML = '<p style="color:#888">Tu carrito está vacío.</p>' +
                        '<a href="/dashboard/duenio/carrito" class="btn-primary" style="margin-top:16px;display:inline-block">Volver al carrito</a>';
                    return;
                }

                let html = '<div style="max-width:700px">';

                html += '<div class="section-title">Resumen de la compra</div>';

                items.forEach(item => {
                    const sub = item.subtotal || (item.precioUnitario * item.cantidad) || 0;
                    html += `
                        <div style="display:flex;align-items:center;justify-content:space-between;background:white;padding:12px 16px;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,0.04);margin-bottom:6px">
                            <div>
                                <strong style="font-size:14px">${item.productoNombre}</strong>
                                <p style="font-size:12px;color:#888">$${(item.precioUnitario || 0).toFixed(2)} x ${item.cantidad}</p>
                            </div>
                            <p style="font-weight:600;font-size:14px">$${sub.toFixed(2)}</p>
                        </div>
                    `;
                });

                if (turnos.length > 0 && items.length > 0) {
                    html += '<p style="font-size:12px;color:#888;font-weight:500;margin:8px 0 4px">SERVICIOS</p>';
                }

                turnos.forEach(t => {
                    html += `
                        <div style="display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#f5f0ff,#e8f0fe);padding:12px 16px;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,0.04);margin-bottom:6px">
                            <div>
                                <strong style="font-size:14px">${ROLE_ICONS[t.rolProfesional] || '📅'} ${t.nombreProfesional}</strong>
                                <p style="font-size:12px;color:#888">${t.rolProfesional} · ${t.nombreMascota} · ${t.fecha}${t.horas ? ' · ' + t.horas + 'h' : ''}</p>
                            </div>
                            <p style="font-weight:600;font-size:14px">$${(t.precio || 0).toFixed(2)}</p>
                        </div>
                    `;
                });

                html += `
                    <div style="text-align:right;margin:12px 0 8px">
                        <p style="font-size:20px;font-weight:700">Total: $${(carritoData.total || 0).toFixed(2)}</p>
                    </div>
                `;

                html += '<div class="section-title">Seleccionar tarjeta</div>';

                if (tarjetas.length === 0) {
                    html += '<p style="color:#888;font-size:14px;margin-bottom:12px">No tenés tarjetas guardadas. Agregá una nueva.</p>';
                } else {
                    tarjetas.forEach(t => {
                        html += `
                            <div class="card-option" onclick="seleccionarTarjeta(${t.idTarjeta}, this)">
                                <input type="radio" name="tarjeta" value="${t.idTarjeta}">
                                <div>
                                    <strong style="font-size:14px">**** **** **** ${t.ultimosDigitos || '****'}</strong>
                                    <p style="font-size:12px;color:#888">${t.titular || ''} · Vence: ${t.vencimiento || ''}</p>
                                </div>
                            </div>
                        `;
                    });
                }

                html += `
                    <div style="margin-top:12px">
                        <button onclick="toggleNuevaTarjeta()" id="btnToggleNueva" style="background:none;border:1px dashed #302b63;color:#302b63;padding:10px 16px;border-radius:10px;cursor:pointer;font-family:Poppins;font-size:13px;width:100%">
                            + Agregar nueva tarjeta
                        </button>
                    </div>
                `;

                html += `
                    <div id="formNuevaTarjeta" style="display:none;background:white;border-radius:12px;padding:16px;margin-top:8px;box-shadow:0 1px 6px rgba(0,0,0,0.04)">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                            <div class="input-group" style="margin:0;grid-column:1/-1">
                                <label for="numTarjeta">Número de tarjeta</label>
                                <input type="text" id="numTarjeta" placeholder="1234 5678 9012 3456" maxlength="19">
                            </div>
                            <div class="input-group" style="margin:0">
                                <label for="titularTarjeta">Titular</label>
                                <input type="text" id="titularTarjeta" placeholder="Como figura en la tarjeta">
                            </div>
                            <div class="input-group" style="margin:0">
                                <label for="cvvTarjeta">CVV</label>
                                <input type="text" id="cvvTarjeta" placeholder="CVV" maxlength="4">
                            </div>
                            <div class="input-group" style="margin:0">
                                <label for="vencTarjeta">Vencimiento</label>
                                <input type="text" id="vencTarjeta" placeholder="MM/AA" maxlength="5">
                            </div>
                            <div class="input-group" style="margin:0">
                                <label for="codigoTarjeta">Código de seguridad</label>
                                <input type="text" id="codigoTarjeta" placeholder="CVV" maxlength="4">
                            </div>
                        </div>
                    </div>
                `;

                html += `
                    <button class="btn-primary" id="btnPagar" onclick="procesarPago()" style="margin-top:20px;width:100%;padding:14px;font-size:16px">
                        Pagar $${(carritoData.total || 0).toFixed(2)}
                    </button>
                `;

                html += '</div>';
                div.innerHTML = html;

            } catch {
                div.innerHTML = '<p style="color:#e74c3c">Error al cargar los datos.</p>';
            }
        }

        function seleccionarTarjeta(id, el) {
            document.querySelectorAll('.card-option').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            el.querySelector('input[type="radio"]').checked = true;
            document.getElementById('formNuevaTarjeta').style.display = 'none';
            document.getElementById('btnToggleNueva').textContent = '+ Agregar nueva tarjeta';
        }

        function toggleNuevaTarjeta() {
            const form = document.getElementById('formNuevaTarjeta');
            const btn = document.getElementById('btnToggleNueva');
            const show = form.style.display !== 'block';
            form.style.display = show ? 'block' : 'none';
            btn.textContent = show ? '− Cerrar' : '+ Agregar nueva tarjeta';
            if (show) {
                document.querySelectorAll('.card-option').forEach(c => c.classList.remove('selected'));
                document.querySelectorAll('.card-option input[type="radio"]').forEach(r => r.checked = false);
            }
        }

        async function procesarPago() {
            const btn = document.getElementById('btnPagar');
            btn.disabled = true;
            btn.textContent = 'Procesando pago...';

            let body = { metodoPago: 'TARJETA' };

            const selected = document.querySelector('.card-option.selected input[type="radio"]');
            if (selected) {
                body.idTarjetaGuardada = parseInt(selected.value);
            } else {
                const form = document.getElementById('formNuevaTarjeta');
                if (form.style.display === 'block') {
                    const raw = document.getElementById('numTarjeta').value.replace(/\s/g, '');
                    if (raw.length < 13 || raw.length > 16) {
                        mostrarAlerta('Número de tarjeta inválido.', 'alert-error');
                        btn.disabled = false; btn.textContent = 'Pagar $' + (carritoData.total || 0).toFixed(2);
                        return;
                    }
                    body.tarjetaNueva = {
                        numeroTarjeta: raw,
                        titular: document.getElementById('titularTarjeta').value.trim(),
                        vencimiento: document.getElementById('vencTarjeta').value.trim(),
                        cvv: document.getElementById('cvvTarjeta').value.trim()
                    };
                    if (!body.tarjetaNueva.titular || !body.tarjetaNueva.vencimiento || !body.tarjetaNueva.cvv) {
                        mostrarAlerta('Completá todos los campos de la tarjeta.', 'alert-error');
                        btn.disabled = false; btn.textContent = 'Pagar $' + (carritoData.total || 0).toFixed(2);
                        return;
                    }
                } else {
                    mostrarAlerta('Seleccioná una tarjeta o agregá una nueva.', 'alert-error');
                    btn.disabled = false; btn.textContent = 'Pagar $' + (carritoData.total || 0).toFixed(2);
                    return;
                }
            }

            try {
                const res = await fetch('/api/carrito/comprar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (res.ok) {
                    mostrarAlerta('Pago realizado con éxito.', 'alert-success');
                    setTimeout(() => { window.location.href = '/compra-exitosa'; }, 1500);
                } else {
                    const json = await res.json();
                    const msgs = json.errores ? json.errores.map(e => e.mensaje).join('. ') : null;
                    mostrarAlerta(msgs || json.error || json.message || 'Error al procesar el pago.', 'alert-error');
                }
            } catch {
                mostrarAlerta('Error de conexión.', 'alert-error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Pagar $' + (carritoData.total || 0).toFixed(2);
            }
        }

        function setupCardListeners() {
            const numInput = document.getElementById('numTarjeta');
            if (numInput) {
                numInput.addEventListener('input', function() {
                    this.value = this.value.replace(/\D/g, '').replace(/(.{4})/g, '$1 ').trim();
                });
            }
            const vencInput = document.getElementById('vencTarjeta');
            if (vencInput) {
                vencInput.addEventListener('input', function() {
                    this.value = this.value.replace(/\D/g, '').replace(/^(\d{2})/, '$1/').substring(0, 5);
                });
            }
        }

        init().then(setupCardListeners);
    </script>
</body>
</html>
