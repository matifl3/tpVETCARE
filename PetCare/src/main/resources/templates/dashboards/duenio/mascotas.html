<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Mascotas - PetCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="dashboard">
        <h1>Mis Mascotas</h1>
        <p>Registrá y administrá las mascotas a tu cargo.</p>

        <div id="alerta" class="alert" role="alert"></div>

        <div class="dash-card" style="margin-bottom:32px">
            <h3 style="margin-bottom:12px">Registrar nueva mascota</h3>
            <form id="formMascota" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="input-group" style="margin:0">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Firulais" required>
                </div>
                <div class="input-group" style="margin:0">
                    <label for="especie">Especie</label>
                    <select id="especie" name="especie" required>
                        <option value="">Seleccioná</option>
                        <option value="Perro">Perro</option>
                        <option value="Gato">Gato</option>
                        <option value="Conejo">Conejo</option>
                        <option value="Ave">Ave</option>
                        <option value="Roedor">Roedor</option>
                        <option value="Peces">Peces</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div class="input-group" style="margin:0">
                    <label for="raza">Raza</label>
                    <input type="text" id="raza" name="raza" placeholder="Ej: Labrador">
                </div>
                <div class="input-group" style="margin:0">
                    <label for="sexo">Sexo</label>
                    <select id="sexo" name="sexo">
                        <option value="">Seleccioná</option>
                        <option value="Macho">Macho</option>
                        <option value="Hembra">Hembra</option>
                    </select>
                </div>
                <div class="input-group" style="margin:0">
                    <label for="peso">Peso (kg)</label>
                    <input type="number" id="peso" name="peso" step="0.1" placeholder="10.5">
                </div>
                <div class="input-group" style="margin:0">
                    <label for="fechaNacimiento">Fecha de nacimiento</label>
                    <input type="date" id="fechaNacimiento" name="fechaNacimiento">
                </div>
                <div style="grid-column:1/-1">
                    <button type="submit" class="btn-primary" id="btnGuardar">Guardar mascota</button>
                </div>
            </form>
        </div>

        <h3 style="margin-bottom:16px">Mis mascotas registradas</h3>
        <div id="listaMascotas" class="card-grid">
            <p style="grid-column:1/-1;color:#888">Cargando...</p>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script th:inline="none">
        const alerta = document.getElementById('alerta');

        function mostrarAlerta(msg, tipo) {
            alerta.textContent = msg;
            alerta.className = 'alert ' + tipo + ' show';
            setTimeout(() => { alerta.className = 'alert'; }, 4000);
        }

        async function cargarMascotas() {
            const div = document.getElementById('listaMascotas');
            try {
                const res = await fetch('/api/mascotas/mias');
                const data = await res.json();
                if (!Array.isArray(data) || data.length === 0) {
                    div.innerHTML = '<p style="grid-column:1/-1;color:#888">Todavía no registraste ninguna mascota.</p>';
                    return;
                }
                div.innerHTML = data.map(m => `
                    <div class="dash-card">
                        <span class="dash-icon">${m.especie === 'Perro' ? '🐕' : m.especie === 'Gato' ? '🐱' : '🐾'}</span>
                        <h3>${m.nombre}</h3>
                        <p>${m.especie}${m.raza ? ' - ' + m.raza : ''}${m.sexo ? ' - ' + m.sexo : ''}</p>
                        <p style="font-size:12px;color:#aaa">${m.peso ? m.peso + ' kg' : ''}${m.fechaNacimiento ? ' · ' + m.fechaNacimiento : ''}</p>
                    </div>
                `).join('');
            } catch {
                div.innerHTML = '<p style="grid-column:1/-1;color:#e74c3c">Error al cargar mascotas.</p>';
            }
        }

        document.getElementById('formMascota').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            const data = {
                nombre: document.getElementById('nombre').value.trim(),
                especie: document.getElementById('especie').value,
                raza: document.getElementById('raza').value.trim(),
                sexo: document.getElementById('sexo').value,
                peso: parseFloat(document.getElementById('peso').value) || null,
                fechaNacimiento: document.getElementById('fechaNacimiento').value || null,
                activo: true,
                idUsuario: null
            };

            if (!data.nombre || !data.especie) {
                mostrarAlerta('Completá nombre y especie.', 'alert-error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Guardando...';

            try {
                const res = await fetch('/api/mascotas/mias', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    mostrarAlerta('Mascota registrada correctamente.', 'alert-success');
                    this.reset();
                    await cargarMascotas();
                } else {
                    const json = await res.json();
                    mostrarAlerta(json.error || json.message || 'Error al registrar.', 'alert-error');
                }
            } catch {
                mostrarAlerta('Error de conexión.', 'alert-error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Guardar mascota';
            }
        });

        cargarMascotas();
    </script>
</body>
</html>
