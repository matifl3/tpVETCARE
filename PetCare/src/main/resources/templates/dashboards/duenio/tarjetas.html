<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Tarjetas - PetCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="dashboard">
        <h1>Mis Tarjetas</h1>
        <p>Administrá tus medios de pago.</p>

        <div id="alerta" class="alert" role="alert"></div>

        <div class="dash-card" style="margin-bottom:32px">
            <h3 style="margin-bottom:12px">Agregar tarjeta</h3>
            <form id="formTarjeta" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="input-group" style="margin:0">
                    <label for="numero">Número de tarjeta</label>
                    <input type="text" id="numero" placeholder="1234 5678 9012 3456" maxlength="19" required>
                </div>
                <div class="input-group" style="margin:0">
                    <label for="titular">Titular</label>
                    <input type="text" id="titular" placeholder="Como figura en la tarjeta" required>
                </div>
                <div class="input-group" style="margin:0">
                    <label for="vencimiento">Vencimiento</label>
                    <input type="text" id="vencimiento" placeholder="MM/AA" maxlength="5" required>
                </div>
                <div class="input-group" style="margin:0">
                    <label for="codigo">Código de seguridad</label>
                    <input type="text" id="codigo" placeholder="CVV" maxlength="4" required>
                </div>
                <div style="grid-column:1/-1">
                    <button type="submit" class="btn-primary" id="btnGuardarTarjeta">Agregar tarjeta</button>
                </div>
            </form>
        </div>

        <h3 style="margin-bottom:16px">Tus tarjetas</h3>
        <div id="listaTarjetas" class="card-grid">
            <p style="grid-column:1/-1;color:#888">Cargando...</p>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script th:inline="none">
        const alerta = document.getElementById('alerta');

        function mostrarAlerta(msg, tipo) {
            alerta.textContent = msg;
            alerta.className = 'alert ' + tipo + ' show';
            setTimeout(() => { alerta.className = 'alert'; }, 3000);
        }

        document.getElementById('numero').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').replace(/(.{4})/g, '$1 ').trim();
        });

        document.getElementById('vencimiento').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').replace(/^(\d{2})/, '$1/').substring(0, 5);
        });

        async function cargarTarjetas() {
            const div = document.getElementById('listaTarjetas');
            try {
                const res = await fetch('/api/tarjetas');
                const data = await res.json();
                const tarjetas = Array.isArray(data) ? data : [];
                if (tarjetas.length === 0) {
                    div.innerHTML = '<p style="grid-column:1/-1;color:#888">No agregaste tarjetas todavía.</p>';
                    return;
                }
                div.innerHTML = tarjetas.map(t => `
                    <div class="dash-card">
                        <span class="dash-icon">💳</span>
                        <h3>**** **** **** ${t.ultimosDigitos || '****'}</h3>
                        <p style="font-size:13px;color:#888">${t.titular || ''}</p>
                        <p style="font-size:13px;color:#888">Vence: ${t.vencimiento || ''}</p>
                        <button onclick="eliminarTarjeta(${t.id})" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:13px;font-family:Poppins;padding:0;margin-top:8px">Eliminar</button>
                    </div>
                `).join('');
            } catch {
                div.innerHTML = '<p style="grid-column:1/-1;color:#e74c3c">Error al cargar tarjetas.</p>';
            }
        }

        async function eliminarTarjeta(id) {
            try {
                const res = await fetch('/api/tarjetas/eliminar/' + id, { method: 'DELETE' });
                if (res.ok) {
                    mostrarAlerta('Tarjeta eliminada.', 'alert-success');
                    await cargarTarjetas();
                } else {
                    mostrarAlerta('Error al eliminar.', 'alert-error');
                }
            } catch {
                mostrarAlerta('Error de conexión.', 'alert-error');
            }
        }

        document.getElementById('formTarjeta').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnGuardarTarjeta');
            const raw = document.getElementById('numero').value.replace(/\s/g, '');
            const data = {
                numero: raw,
                titular: document.getElementById('titular').value.trim(),
                vencimiento: document.getElementById('vencimiento').value.trim(),
                codigoSeguridad: document.getElementById('codigo').value.trim()
            };

            if (raw.length < 13 || raw.length > 16) {
                mostrarAlerta('Número de tarjeta inválido.', 'alert-error');
                return;
            }
            if (!data.titular || !data.vencimiento || !data.codigoSeguridad) {
                mostrarAlerta('Completá todos los campos.', 'alert-error');
                return;
            }
            if (data.codigoSeguridad.length < 3) {
                mostrarAlerta('Código de seguridad inválido.', 'alert-error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Guardando...';

            try {
                const res = await fetch('/api/tarjetas/agregar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    mostrarAlerta('Tarjeta agregada correctamente.', 'alert-success');
                    this.reset();
                    await cargarTarjetas();
                } else {
                    const json = await res.json();
                    mostrarAlerta(json.error || json.message || 'Error al agregar.', 'alert-error');
                }
            } catch {
                mostrarAlerta('Error de conexión.', 'alert-error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Agregar tarjeta';
            }
        });

        cargarTarjetas();
    </script>
</body>
</html>
