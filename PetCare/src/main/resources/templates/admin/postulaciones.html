<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulaciones - Admin PetCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="dashboard">
        <h1>Postulaciones de Profesionales</h1>
        <p>Revisá y gestioná las solicitudes de profesionales.</p>
        <div id="alerta" class="alert" role="alert"></div>
        <div style="margin-bottom:16px;display:flex;gap:8px">
            <button onclick="cargarEstado('PENDIENTE')" class="btn-secondary" style="padding:8px 16px">Pendientes</button>
            <button onclick="cargarEstado('APROBADO')" class="btn-primary" style="padding:8px 16px">Aprobados</button>
            <button onclick="cargarEstado('RECHAZADO')" class="btn-secondary" style="padding:8px 16px">Rechazados</button>
        </div>
        <div id="loading" style="color:#888">Cargando...</div>
        <div id="listaPostulaciones"></div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <script th:inline="none">
        const alerta = document.getElementById('alerta');
        const loading = document.getElementById('loading');
        function mostrarAlerta(msg, tipo) { alerta.textContent = msg; alerta.className = 'alert ' + tipo + ' show'; setTimeout(() => { alerta.className = 'alert'; }, 3000); }
        function mostrarLoading(v) { loading.style.display = v ? 'block' : 'none'; }
        async function procesar(id, accion) {
            if (!confirm('¿' + (accion === 'aprobar' ? 'Aprobar' : 'Rechazar') + ' este profesional?')) return;
            mostrarLoading(true);
            try {
                const res = await fetch('/api/profesionales/' + id + '/' + accion, { method: 'PUT' });
                if (res.ok) { mostrarAlerta('Profesional ' + (accion === 'aprobar' ? 'aprobado' : 'rechazado') + '.', 'alert-success'); cargarEstado('PENDIENTE'); }
                else { const t = await res.text(); mostrarAlerta(t, 'alert-error'); }
            } catch { mostrarAlerta('Error de conexión.', 'alert-error'); }
            finally { mostrarLoading(false); }
        }
        async function cargarEstado(estado) {
            mostrarLoading(true);
            try {
                const res = await fetch('/api/profesionales/estado/' + estado);
                if (!res.ok) throw new Error();
                const data = await res.json();
                const div = document.getElementById('listaPostulaciones');
                if (!data || data.length === 0) { div.innerHTML = '<p style="color:#888">No hay profesionales en este estado.</p>'; return; }
                div.innerHTML = '<div style="display:flex;flex-direction:column;gap:8px">' +
                    data.map(p => `
                        <div style="display:flex;align-items:center;justify-content:space-between;background:white;padding:14px 18px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
                            <div>
                                <strong>${p.nombre} ${p.apellido || ''}</strong>
                                <p style="font-size:12px;color:#888">${p.email} · ${p.rol}${p.matricula ? ' · Mat: ' + p.matricula : ''}</p>
                            </div>
                            <div style="display:flex;gap:6px">
                                ${estado === 'PENDIENTE' ? `
                                    <button onclick="procesar(${p.id},'aprobar')" class="btn-primary" style="padding:6px 16px;font-size:13px">Aprobar</button>
                                    <button onclick="procesar(${p.id},'rechazar')" class="btn-secondary" style="padding:6px 16px;font-size:13px">Rechazar</button>
                                ` : `<span style="background:${estado === 'APROBADO' ? '#d4edda' : '#f8d7da'};color:${estado === 'APROBADO' ? '#155724' : '#721c24'};padding:4px 12px;border-radius:20px;font-size:12px">${estado}</span>`}
                            </div>
                        </div>
                    `).join('') + '</div>';
            } catch { mostrarAlerta('Error al cargar.', 'alert-error'); }
            finally { mostrarLoading(false); }
        }
        cargarEstado('PENDIENTE');
    </script>
</body>
</html>
