<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos - Admin PetCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="dashboard">
        <h1>Turnos</h1>
        <p>Todos los turnos de la plataforma.</p>
        <div id="alerta" class="alert" role="alert"></div>
        <div id="loading" style="color:#888">Cargando...</div>
        <div id="listaTurnos"></div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <script th:inline="none">
        const alerta = document.getElementById('alerta');
        const loading = document.getElementById('loading');
        function mostrarAlerta(msg, tipo) { alerta.textContent = msg; alerta.className = 'alert ' + tipo + ' show'; setTimeout(() => { alerta.className = 'alert'; }, 3000); }
        function mostrarLoading(v) { loading.style.display = v ? 'block' : 'none'; }
        async function cancelarTurno(id) {
            if (!confirm('¿Cancelar este turno?')) return;
            try {
                const res = await fetch('/api/turnos/' + id + '/cancelar', { method: 'PUT' });
                if (res.ok) { mostrarAlerta('Turno cancelado.', 'alert-success'); cargarTurnos(); }
                else { mostrarAlerta('Error al cancelar.', 'alert-error'); }
            } catch { mostrarAlerta('Error de conexión.', 'alert-error'); }
        }
        async function cargarTurnos() {
            mostrarLoading(true);
            try {
                const res = await fetch('/api/turnos');
                if (!res.ok) throw new Error();
                const data = await res.json();
                const div = document.getElementById('listaTurnos');
                if (!data || data.length === 0) { div.innerHTML = '<p style="color:#888">No hay turnos registrados.</p>'; return; }
                div.innerHTML = '<div style="display:flex;flex-direction:column;gap:8px">' +
                    data.map(t => `
                        <div style="display:flex;align-items:center;justify-content:space-between;background:white;padding:14px 18px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
                            <div>
                                <strong>${t.fecha || ''} ${t.horas ? '· ' + t.horas + 'h' : ''}</strong>
                                <p style="font-size:12px;color:#888">Mascota: ${t.nombreMascota || 'ID ' + t.id_mascota} · Prof: ${t.nombreProfesional || 'ID ' + t.id_profesional}</p>
                            </div>
                            <div style="display:flex;align-items:center;gap:8px">
                                <span style="font-size:12px;padding:4px 10px;border-radius:20px;background:${t.estadoTurno === 'CONFIRMADO' ? '#d4edda' : t.estadoTurno === 'CANCELADO' ? '#f8d7da' : '#fff3cd'};color:${t.estadoTurno === 'CONFIRMADO' ? '#155724' : t.estadoTurno === 'CANCELADO' ? '#721c24' : '#856404'}">${t.estadoTurno}</span>
                                <span style="font-weight:600">$${(t.precio || 0).toFixed(2)}</span>
                                ${t.estadoTurno !== 'CANCELADO' && t.estadoTurno !== 'CONFIRMADO' ? `<button onclick="cancelarTurno(${t.id})" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:12px">Cancelar</button>` : ''}
                            </div>
                        </div>
                    `).join('') + '</div>';
            } catch { mostrarAlerta('Error al cargar turnos.', 'alert-error'); }
            finally { mostrarLoading(false); }
        }
        cargarTurnos();
    </script>
</body>
</html>
