<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Admin PetCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="dashboard">
        <h1>Usuarios</h1>
        <p>Todos los usuarios registrados en PetCare.</p>
        <div id="alerta" class="alert" role="alert"></div>
        <div style="margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap">
            <input id="searchInput" type="text" placeholder="Buscar por ID..." style="padding:8px 14px;border:1px solid #ddd;border-radius:8px;flex:1;min-width:200px">
            <button onclick="buscarUsuario()" class="btn-secondary" style="padding:8px 20px">Buscar</button>
            <button onclick="cargarTodos()" class="btn-primary" style="padding:8px 20px">Ver todos</button>
        </div>
        <div id="loading" style="color:#888">Cargando...</div>
        <div id="listaUsuarios"></div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <script th:inline="none">
        const alerta = document.getElementById('alerta');
        const loading = document.getElementById('loading');
        function mostrarAlerta(msg, tipo) { alerta.textContent = msg; alerta.className = 'alert ' + tipo + ' show'; setTimeout(() => { alerta.className = 'alert'; }, 3000); }
        function mostrarLoading(v) { loading.style.display = v ? 'block' : 'none'; }
        function renderUsers(users) {
            const div = document.getElementById('listaUsuarios');
            if (!users || users.length === 0) { div.innerHTML = '<p style="color:#888">No hay usuarios.</p>'; return; }
            div.innerHTML = '<div style="display:flex;flex-direction:column;gap:8px">' +
                users.map(u => `
                    <div style="display:flex;align-items:center;justify-content:space-between;background:white;padding:14px 18px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
                        <div>
                            <strong>${u.nombre} ${u.apellido || ''}</strong>
                            <p style="font-size:12px;color:#888">${u.email} · ${u.rol}${u.estadoProfesional ? ' · ' + u.estadoProfesional : ''}</p>
                        </div>
                        <span style="background:${u.activo ? '#d4edda' : '#f8d7da'};color:${u.activo ? '#155724' : '#721c24'};padding:4px 12px;border-radius:20px;font-size:12px">${u.activo ? 'Activo' : 'Inactivo'}</span>
                    </div>
                `).join('') + '</div>';
        }
        async function cargarTodos() {
            mostrarLoading(true);
            document.getElementById('searchInput').value = '';
            try {
                const res = await fetch('/api/usuarios');
                if (!res.ok) throw new Error('Error');
                renderUsers(await res.json());
            } catch { mostrarAlerta('Error al cargar usuarios.', 'alert-error'); }
            finally { mostrarLoading(false); }
        }
        async function buscarUsuario() {
            const id = document.getElementById('searchInput').value.trim();
            if (!id) { cargarTodos(); return; }
            mostrarLoading(true);
            try {
                const res = await fetch('/api/usuarios/buscar/' + id);
                if (!res.ok) { mostrarAlerta('Usuario no encontrado.', 'alert-error'); renderUsers(null); return; }
                renderUsers([await res.json()]);
            } catch { mostrarAlerta('Error de conexión.', 'alert-error'); }
            finally { mostrarLoading(false); }
        }
        document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') buscarUsuario(); });
        cargarTodos();
    </script>
</body>
</html>
