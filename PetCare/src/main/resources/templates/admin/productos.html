<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Admin PetCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="dashboard">
        <h1>Productos</h1>
        <p>Gestioná el catálogo de productos.</p>
        <div id="alerta" class="alert" role="alert"></div>
        <div style="margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap">
            <button onclick="abrirFormulario(null)" class="btn-primary" style="padding:8px 20px">+ Nuevo producto</button>
            <button onclick="cargarStockBajo()" class="btn-secondary" style="padding:8px 16px">Stock bajo</button>
        </div>
        <div id="loading" style="color:#888">Cargando...</div>
        <div id="listaProductos"></div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <div id="modalProducto" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:2000;align-items:center;justify-content:center">
        <div style="background:white;padding:28px;border-radius:16px;width:90%;max-width:480px">
            <h3 id="modalTitle" style="margin-bottom:16px">Nuevo Producto</h3>
            <input id="prodNombre" placeholder="Nombre" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;margin-bottom:8px">
            <input id="prodPrecio" type="number" step="0.01" placeholder="Precio" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;margin-bottom:8px">
            <input id="prodStock" type="number" placeholder="Stock" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;margin-bottom:8px">
            <input id="prodCategoria" placeholder="Categoría" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;margin-bottom:8px">
            <input id="prodUrl" placeholder="URL de imagen (opcional)" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;margin-bottom:16px">
            <div style="display:flex;gap:8px;justify-content:flex-end">
                <button onclick="cerrarModal()" class="btn-secondary" style="padding:8px 20px">Cancelar</button>
                <button onclick="guardarProducto()" class="btn-primary" style="padding:8px 20px">Guardar</button>
            </div>
        </div>
    </div>
    <script th:inline="none">
        const alerta = document.getElementById('alerta');
        const loading = document.getElementById('loading');
        let editandoId = null;
        function mostrarAlerta(msg, tipo) { alerta.textContent = msg; alerta.className = 'alert ' + tipo + ' show'; setTimeout(() => { alerta.className = 'alert'; }, 3000); }
        function mostrarLoading(v) { loading.style.display = v ? 'block' : 'none'; }
        function abrirFormulario(producto) {
            editandoId = producto ? producto.idProducto || producto.id : null;
            document.getElementById('modalTitle').textContent = editandoId ? 'Editar Producto' : 'Nuevo Producto';
            document.getElementById('prodNombre').value = producto ? (producto.nombre || '') : '';
            document.getElementById('prodPrecio').value = producto ? (producto.precio || '') : '';
            document.getElementById('prodStock').value = producto ? (producto.stock || '') : '';
            document.getElementById('prodCategoria').value = producto ? (producto.categoria || '') : '';
            document.getElementById('prodUrl').value = producto ? (producto.imagenUrl || '') : '';
            document.getElementById('modalProducto').style.display = 'flex';
        }
        function cerrarModal() { document.getElementById('modalProducto').style.display = 'none'; editandoId = null; }
        async function guardarProducto() {
            const body = {
                nombre: document.getElementById('prodNombre').value.trim(),
                precio: parseFloat(document.getElementById('prodPrecio').value) || 0,
                stock: parseInt(document.getElementById('prodStock').value) || 0,
                categoria: document.getElementById('prodCategoria').value.trim(),
                imagenUrl: document.getElementById('prodUrl').value.trim()
            };
            if (!body.nombre) { mostrarAlerta('El nombre es obligatorio.', 'alert-error'); return; }
            try {
                const url = editandoId ? '/api/productos/' + editandoId : '/api/productos';
                const res = await fetch(url, { method: editandoId ? 'PUT' : 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
                if (res.ok) { mostrarAlerta(editandoId ? 'Producto actualizado.' : 'Producto creado.', 'alert-success'); cerrarModal(); cargarProductos(); }
                else { mostrarAlerta('Error al guardar.', 'alert-error'); }
            } catch { mostrarAlerta('Error de conexión.', 'alert-error'); }
        }
        async function eliminarProducto(id) {
            if (!confirm('¿Eliminar este producto?')) return;
            try {
                const res = await fetch('/api/productos/' + id, { method: 'DELETE' });
                if (res.ok) { mostrarAlerta('Producto eliminado.', 'alert-success'); cargarProductos(); }
                else { mostrarAlerta('Error al eliminar.', 'alert-error'); }
            } catch { mostrarAlerta('Error de conexión.', 'alert-error'); }
        }
        async function cargarProductos() {
            mostrarLoading(true);
            try {
                const res = await fetch('/api/productos');
                if (!res.ok) throw new Error();
                const data = await res.json();
                renderProductos(data);
            } catch { mostrarAlerta('Error al cargar.', 'alert-error'); }
            finally { mostrarLoading(false); }
        }
        async function cargarStockBajo() {
            mostrarLoading(true);
            try {
                const res = await fetch('/api/productos/stock/bajo');
                if (!res.ok) throw new Error();
                const data = await res.json();
                if (!data || data.length === 0) { document.getElementById('listaProductos').innerHTML = '<p style="color:#888">No hay productos con stock bajo.</p>'; return; }
                renderProductos(data);
            } catch { mostrarAlerta('Error al cargar.', 'alert-error'); }
            finally { mostrarLoading(false); }
        }
        function renderProductos(data) {
            const div = document.getElementById('listaProductos');
            if (!data || data.length === 0) { div.innerHTML = '<p style="color:#888">No hay productos.</p>'; return; }
            div.innerHTML = '<div style="display:flex;flex-direction:column;gap:8px">' +
                data.map(p => `
                    <div style="display:flex;align-items:center;justify-content:space-between;background:white;padding:14px 18px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
                        <div>
                            <strong>${p.nombre || ''}</strong>
                            <p style="font-size:12px;color:#888">${p.categoria || ''} · Stock: ${p.stock || 0} · $${(p.precio || 0).toFixed(2)}</p>
                        </div>
                        <div style="display:flex;gap:6px">
                            <button onclick="abrirFormulario(${JSON.stringify(p).replace(/"/g, "'")})" style="background:none;border:none;color:#302b63;cursor:pointer;font-size:12px">Editar</button>
                            <button onclick="eliminarProducto(${p.idProducto || p.id})" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:12px">Eliminar</button>
                        </div>
                    </div>
                `).join('') + '</div>';
        }
        cargarProductos();
    </script>
</body>
</html>
