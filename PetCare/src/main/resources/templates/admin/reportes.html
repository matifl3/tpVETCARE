<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - Admin PetCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="dashboard">
        <h1>Reportes</h1>
        <p>Estadísticas y ganancias mensuales.</p>
        <div id="alerta" class="alert" role="alert"></div>
        <div style="margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <label style="font-size:13px">Año: <input id="filtroAnio" type="number" value="2025" style="padding:6px 10px;border:1px solid #ddd;border-radius:6px;width:80px"></label>
            <label style="font-size:13px">Mes: <input id="filtroMes" type="number" min="1" max="12" value="1" style="padding:6px 10px;border:1px solid #ddd;border-radius:6px;width:60px"></label>
            <button onclick="cargarReportes()" class="btn-primary" style="padding:8px 20px">Actualizar</button>
        </div>
        <div id="loading" style="color:#888">Cargando...</div>
        <div id="contenidoReportes" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px"></div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <script th:inline="none">
        const alerta = document.getElementById('alerta');
        const loading = document.getElementById('loading');
        function mostrarAlerta(msg, tipo) { alerta.textContent = msg; alerta.className = 'alert ' + tipo + ' show'; setTimeout(() => { alerta.className = 'alert'; }, 3000); }
        function mostrarLoading(v) { loading.style.display = v ? 'block' : 'none'; }
        async function cargarReportes() {
            mostrarLoading(true);
            const anio = document.getElementById('filtroAnio').value || 2025;
            const mes = document.getElementById('filtroMes').value || 1;
            const div = document.getElementById('contenidoReportes');
            try {
                const [resGanancias, resVentas, resMasVendidos] = await Promise.all([
                    fetch('/api/carrito/reportes/ganancias?anio=' + anio + '&mes=' + mes),
                    fetch('/api/carrito/reportes/ventas?fechaInicio=' + anio + '-' + mes + '-01&fechaFin=' + anio + '-' + mes + '-31'),
                    fetch('/api/carrito/reportes/productos-mas-vendidos?anio=' + anio + '&mes=' + mes)
                ]);
                const ganancias = await resGanancias.text();
                const ventas = await resVentas.json();
                const masVendidos = await resMasVendidos.json();
                const totalVentas = Array.isArray(ventas) ? ventas.reduce((s, v) => s + (v.total || 0), 0) : 0;
                let html = '';
                html += '<div class="dash-card"><span class="dash-icon">💰</span><h3>Ganancias</h3><p style="font-size:24px;font-weight:700;color:#302b63">$' + (parseFloat(ganancias) || 0).toFixed(2) + '</p><p style="font-size:13px;color:#888">Mes ' + mes + '/' + anio + '</p></div>';
                html += '<div class="dash-card"><span class="dash-icon">📦</span><h3>Ventas totales</h3><p style="font-size:24px;font-weight:700;color:#302b63">$' + (totalVentas || 0).toFixed(2) + '</p><p style="font-size:13px;color:#888">' + (Array.isArray(ventas) ? ventas.length : 0) + ' transacciones</p></div>';
                html += '<div class="dash-card"><span class="dash-icon">🏆</span><h3>Más vendidos</h3>' +
                    (Array.isArray(masVendidos) && masVendidos.length > 0
                        ? masVendidos.slice(0,5).map(p => '<p style="font-size:13px">' + (p.nombre || 'Producto') + ' — <strong>x' + (p.cantidad || 0) + '</strong></p>').join('')
                        : '<p style="font-size:13px;color:#888">Sin datos</p>') +
                    '</div>';
                div.innerHTML = html;
            } catch { mostrarAlerta('Error al cargar reportes.', 'alert-error'); }
            finally { mostrarLoading(false); }
        }
        cargarReportes();
    </script>
</body>
</html>
