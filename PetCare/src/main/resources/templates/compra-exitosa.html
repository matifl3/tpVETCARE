<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compra Exitosa - PetCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .success-page { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:60px 20px; gap:16px; }
        .success-icon { font-size:80px; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="dashboard success-page">
        <div class="success-icon">✅</div>
        <h1>¡Compra exitosa!</h1>
        <p style="color:#555;max-width:400px">Tu compra fue procesada correctamente. Recibí un resumen en tu correo electrónico.</p>
        <div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;justify-content:center">
            <a href="/dashboard/duenio" class="btn-primary" style="text-decoration:none">Volver al inicio</a>
            <a href="/dashboard/duenio/mis-turnos" class="btn-secondary" style="text-decoration:none">Mis turnos</a>
            <a href="/dashboard/duenio/tienda" class="btn-secondary" style="text-decoration:none">Seguir comprando</a>
        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
