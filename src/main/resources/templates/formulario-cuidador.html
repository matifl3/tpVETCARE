<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare - Nuevo Cuidador</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f5f0ff, #e8f0fe); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 24px; padding: 40px; width: 100%; max-width: 520px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .card h1 { font-size: 26px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; text-align: center; }
        .card > p { font-size: 13px; color: #888; text-align: center; margin-bottom: 28px; }
        .logo { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 20px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
        .input-group input, .input-group select { width: 100%; padding: 12px 16px; border: 2px solid #e8e8ef; border-radius: 12px; font-size: 14px; font-family: inherit; transition: all 0.3s ease; background: #fafafe; color: #333; outline: none; }
        .input-group input:focus, .input-group select:focus { border-color: #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.15); background: white; }
        .btn-submit { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.5); }
        .footer-links { text-align: center; margin-top: 20px; }
        .footer-links a { color: #667eea; font-size: 13px; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🐾 PetCare</div>
        <h1>Registrar Cuidador</h1>
        <p>Completá los datos del nuevo cuidador</p>

        <form th:action="@{/cuidadores/guardar}" method="post">
            <div class="input-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Nombre" required>
            </div>
            <div class="input-group">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" name="apellido" placeholder="Apellido" required>
            </div>
            <div class="input-group">
                <label for="especialidad">Especialidad</label>
                <select id="especialidad" name="especialidad" required>
                    <option value="">Seleccioná una especialidad...</option>
                    <option value="Veterinaria">Veterinaria</option>
                    <option value="Paseo">Paseo</option>
                    <option value="Peluqueria">Peluquería</option>
                    <option value="Adiestramiento">Adiestramiento</option>
                    <option value="Cuidado">Cuidado</option>
                </select>
            </div>
            <div class="input-group">
                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono" name="telefono" placeholder="+54 11 1234-5678">
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="correo@ejemplo.com">
            </div>

            <button type="submit" class="btn-submit">Registrar Cuidador</button>
        </form>

        <div class="footer-links">
            <a href="/cuidadores">← Volver</a>
        </div>
    </div>
</body>
</html>
