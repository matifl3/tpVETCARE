<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare - Panel Usuario</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-logo">🐾 PetCare</div>
            <div class="nav-links">
                <span class="nav-role">Usuario</span>
                <a href="/" class="nav-logout">Cerrar sesión</a>
            </div>
        </div>
    </nav>

    <main class="dashboard">
        <h1>Panel de Usuario</h1>
        <p>Bienvenido a tu panel de control.</p>

        <div class="card-grid">
            <div class="dash-card">
                <span class="dash-icon">🔍</span>
                <h3>Buscar Cuidadores</h3>
                <p>Encuentra cuidadores cercanos</p>
                <a href="#" class="dash-link">Ir</a>
            </div>
            <div class="dash-card">
                <span class="dash-icon">📅</span>
                <h3>Mis Reservas</h3>
                <p>Revisa el estado de tus reservas</p>
                <a href="#" class="dash-link">Ir</a>
            </div>
            <div class="dash-card">
                <span class="dash-icon">⭐</span>
                <h3>Valoraciones</h3>
                <p>Califica a los cuidadores</p>
                <a href="#" class="dash-link">Ir</a>
            </div>
        </div>
    </main>
</body>
</html>
