<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare - Iniciar Sesión</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <span class="logo-icon">🐾</span>
                    <h1>PetCare</h1>
                </div>
                <p class="subtitulo">Sistema de Gestión Veterinaria</p>
            </div>

            <div class="tab-buttons">
                <button class="tab-btn active" onclick="showTab('login')">Iniciar Sesión</button>
                <button class="tab-btn" onclick="showTab('register')">Registrarse</button>
            </div>

            <!-- LOGIN FORM -->
            <div id="loginForm" class="form-container active">
                <form action="/login" method="post">
                    <div class="role-selector">
                        <label class="role-label">Ingresar como</label>
                        <div class="role-options">
                            <label class="role-card">
                                <input type="radio" name="rol" value="dueno" checked>
                                <div class="role-content">
                                    <span class="role-icon">👤</span>
                                    <span class="role-text">Dueño</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="veterinario">
                                <div class="role-content">
                                    <span class="role-icon">👨‍⚕️</span>
                                    <span class="role-text">Veterinario</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="administrador">
                                <div class="role-content">
                                    <span class="role-icon">⚙️</span>
                                    <span class="role-text">Admin</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="paseador">
                                <div class="role-content">
                                    <span class="role-icon">🐕</span>
                                    <span class="role-text">Paseador</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="peluquero">
                                <div class="role-content">
                                    <span class="role-icon">✂️</span>
                                    <span class="role-text">Peluquero</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="adiestrador">
                                <div class="role-content">
                                    <span class="role-icon">🎯</span>
                                    <span class="role-text">Adiestrador</span>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="rol" value="cuidador">
                                <div class="role-content">
                                    <span class="role-icon">🏠</span>
                                    <span class="role-text">Cuidador</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <div class="forgot-password">
                        <a href="#">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-primary">Iniciar Sesión</button>
                </form>
            </div>

            <!-- REGISTER FORM -->
            <div id="registerForm" class="form-container">
                <form action="/register" method="post">
                    <input type="hidden" name="rol" value="usuario">

                    <div class="input-group">
                        <label for="reg-nombre">Nombre</label>
                        <input type="text" id="reg-nombre" name="nombre" placeholder="Juan" required>
                    </div>

                    <div class="input-group">
                        <label for="reg-apellido">Apellido</label>
                        <input type="text" id="reg-apellido" name="apellido" placeholder="Pérez" required>
                    </div>

                    <div class="input-group">
                        <label for="reg-email">Correo electrónico</label>
                        <input type="email" id="reg-email" name="email" placeholder="tu@correo.com" required>
                    </div>

                    <div class="input-group">
                        <label for="reg-password">Contraseña</label>
                        <input type="password" id="reg-password" name="password" placeholder="Mínimo 6 caracteres" required>
                    </div>

                    <div class="input-group">
                        <label for="reg-confirm">Confirmar contraseña</label>
                        <input type="password" id="reg-confirm" name="confirmPassword" placeholder="Repite la contraseña" required>
                    </div>

                    <button type="submit" class="btn-primary">Crear Cuenta</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function showTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const btns = document.querySelectorAll('.tab-btn');

            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
                btns[1].classList.add('active');
                btns[0].classList.remove('active');
            }
        }
    </script>
</body>
</html>
