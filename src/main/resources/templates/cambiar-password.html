<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare - Cambiar contraseña</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f0ff, #e8f0fe);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        .card h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
            text-align: center;
        }
        .card > p {
            font-size: 13px;
            color: #888;
            text-align: center;
            margin-bottom: 28px;
        }
        .logo {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            text-align: center;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .input-group { margin-bottom: 18px; }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8ef;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #fafafe;
            color: #333;
            outline: none;
        }
        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
            background: white;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.5);
        }
        .info-box {
            background: #e8f0fe;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #302b63;
            line-height: 1.5;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🐾 PetCare</div>
        <h1>Cambiar contraseña</h1>
        <p>Es la primera vez que iniciás sesión. Cambiá tu contraseña.</p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="info-box">
            Iniciaste sesión con una contraseña temporal. Por seguridad,
            elegí una nueva contraseña para continuar.
        </div>

        <form th:action="@{/cambiar-password}" method="post">
            <div class="input-group">
                <label for="nuevaPassword">Nueva contraseña</label>
                <input type="password" id="nuevaPassword" name="nuevaPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>

            <div class="input-group">
                <label for="confirmarPassword">Confirmar contraseña</label>
                <input type="password" id="confirmarPassword" name="confirmarPassword" placeholder="Repetí la contraseña" required minlength="6">
            </div>

            <button type="submit" class="btn-submit">Cambiar contraseña</button>
        </form>
    </div>
</body>
</html>
