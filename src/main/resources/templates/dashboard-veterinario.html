<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare - Panel Veterinario</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-logo">🐾 PetCare</div>
            <div class="nav-links">
                <span class="nav-role">Veterinario</span>
                <a href="/" class="nav-logout">Cerrar sesión</a>
            </div>
        </div>
    </nav>

    <main class="dashboard">
        <h1>Panel de Veterinario</h1>
        <p>Bienvenido a tu panel de control.</p>

        <div class="card-grid">
            <div class="dash-card">
                <span class="dash-icon">📋</span>
                <h3>Citas</h3>
                <p>Gestiona tus citas programadas</p>
                <a href="#" class="dash-link">Ir</a>
            </div>
            <div class="dash-card">
                <span class="dash-icon">🐾</span>
                <h3>Pacientes</h3>
                <p>Historial clínico de mascotas</p>
                <a href="#" class="dash-link">Ir</a>
            </div>
            <div class="dash-card">
                <span class="dash-icon">📊</span>
                <h3>Reportes</h3>
                <p>Estadísticas y reportes</p>
                <a href="#" class="dash-link">Ir</a>
            </div>
        </div>
    </main>
</body>
</html>
