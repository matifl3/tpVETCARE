<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare - Cuidadores</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, Arial, sans-serif; background: #f5f5fa; min-height: 100vh; }
        .navbar { background: white; box-shadow: 0 2px 20px rgba(0,0,0,0.08); padding: 0 20px; position: sticky; top: 0; z-index: 100; }
        .nav-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .nav-logo { font-size: 22px; font-weight: 700; color: #302b63; }
        .nav-links { display: flex; align-items: center; gap: 16px; }
        .nav-role { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; }
        .nav-link { color: #888; text-decoration: none; font-size: 14px; font-weight: 500; }
        .nav-link:hover { color: #667eea; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        h1 { font-size: 26px; color: #1a1a2e; margin-bottom: 24px; }
        .alert { padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 500; margin-bottom: 20px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .btn { display: inline-block; padding: 8px 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; text-decoration: none; border-radius: 10px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; font-family: inherit; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); transition: all 0.3s ease; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .card h3 { font-size: 18px; color: #302b63; margin-bottom: 8px; }
        .card p { font-size: 13px; color: #888; margin-bottom: 4px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-disponible { background: #d4edda; color: #155724; }
        .badge-ocupado { background: #f8d7da; color: #721c24; }
        .vacio { text-align: center; padding: 40px; color: #888; font-size: 14px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-logo">🐾 PetCare</div>
            <div class="nav-links">
                <span class="nav-role">Profesionales</span>
                <a th:href="@{|/dashboard/${#strings.toLowerCase(session.usuario.rol.name())}|}" class="nav-link">Dashboard</a>
                <a href="/logout" class="nav-link" style="color: #e74c3c;">Cerrar sesión</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <h1>Profesionales</h1>

        <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>

        <div th:unless="${#lists.size(cuidadores) > 0}" class="vacio">
            No hay profesionales registrados en este momento.
        </div>

        <div class="card-grid" th:if="${#lists.size(cuidadores) > 0}">
            <div class="card" th:each="c : ${cuidadores}">
                <h3 th:text="${c.nombre} + ' ' + ${c.apellido}">Juan Pérez</h3>
                <p><strong>Especialidad:</strong> <span th:text="${c.especialidad}">Veterinaria</span></p>
                <p><strong>Email:</strong> <span th:text="${c.email}">correo@ejemplo.com</span></p>
                <p><strong>Teléfono:</strong> <span th:text="${c.telefono} ?: '—'">123456</span></p>
                <p style="margin-top:8px;">
                    <span class="badge" th:classappend="${c.disponible} ? 'badge-disponible' : 'badge-ocupado'"
                          th:text="${c.disponible} ? 'Disponible' : 'Ocupado'">Disponible</span>
                </p>
                <p style="margin-top:12px;">
                    <a th:href="@{/reservas/nueva(cuidadorId=${c.idCuidador})}" class="btn" style="display:inline-block;padding:6px 16px;font-size:12px;text-decoration:none;">Reservar</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
