<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare - Reservas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, Arial, sans-serif; background: #f5f5fa; min-height: 100vh; }
        .navbar { background: white; box-shadow: 0 2px 20px rgba(0,0,0,0.08); padding: 0 20px; position: sticky; top: 0; z-index: 100; }
        .nav-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .nav-logo { font-size: 22px; font-weight: 700; color: #302b63; }
        .nav-links { display: flex; align-items: center; gap: 16px; }
        .nav-role { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; }
        .nav-link { color: #888; text-decoration: none; font-size: 14px; font-weight: 500; }
        .nav-link:hover { color: #667eea; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        h1 { font-size: 26px; color: #1a1a2e; margin-bottom: 24px; }
        .alert { padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 500; margin-bottom: 20px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .btn { display: inline-block; padding: 8px 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; text-decoration: none; border-radius: 10px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; font-family: inherit; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        .btn-success { background: #2ecc71; }
        .btn-warning { background: #f39c12; }
        .btn-danger { background: #e74c3c; }
        .btn-secondary { background: #f0f0f5; color: #555; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        th { background: #fafafe; text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 12px 16px; font-size: 13px; color: #333; border-top: 1px solid #f0f0f5; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-pendiente { background: #fff3cd; color: #856404; }
        .badge-confirmada { background: #d4edda; color: #155724; }
        .badge-cancelada { background: #f8d7da; color: #721c24; }
        .acciones { display: flex; gap: 6px; }
        .vacio { text-align: center; padding: 40px; color: #888; font-size: 14px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-logo">🐾 PetCare</div>
            <div class="nav-links">
                <span class="nav-role">Reservas</span>
                <a th:href="@{|/dashboard/${#strings.toLowerCase(usuario.rol.name())}|}" class="nav-link">Dashboard</a>
                <a href="/logout" class="nav-link" style="color: #e74c3c;">Cerrar sesión</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="top-bar">
            <h1>Reservas</h1>
            <a href="/reservas/nueva" class="btn">+ Nueva Reserva</a>
        </div>

        <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div th:unless="${#lists.size(reservas) > 0}" class="vacio">
            No hay reservas registradas.
        </div>

        <table th:if="${#lists.size(reservas) > 0}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Servicio</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${reservas}">
                    <td th:text="${r.idReserva}">1</td>
                    <td th:text="${r.fecha}">2026-06-16</td>
                    <td th:text="${r.hora}">10:00</td>
                    <td th:text="${r.servicio}">Veterinaria</td>
                    <td>
                        <span class="badge"
                              th:classappend="${r.estado == 'PENDIENTE' ? 'badge-pendiente' : (r.estado == 'CONFIRMADA' ? 'badge-confirmada' : 'badge-cancelada')}"
                              th:text="${r.estado}">PENDIENTE</span>
                    </td>
                    <td>
                        <div class="acciones" th:if="${r.estado == 'PENDIENTE'}">
                            <form th:action="@{/reservas/confirmar/{id}(id=${r.idReserva})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-success" style="padding:4px 12px;font-size:12px;">Confirmar</button>
                            </form>
                            <form th:action="@{/reservas/cancelar/{id}(id=${r.idReserva})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-warning" style="padding:4px 12px;font-size:12px;">Cancelar</button>
                            </form>
                            <form th:action="@{/reservas/eliminar/{id}(id=${r.idReserva})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-danger" style="padding:4px 12px;font-size:12px;">Eliminar</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
