<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare - Panel Dueño</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-logo">🐾 PetCare</div>
            <div class="nav-links">
                <span class="nav-role">Dueño</span>
                <a href="/" class="nav-logout">Cerrar sesión</a>
            </div>
        </div>
    </nav>

    <main class="dashboard">
        <h1>Panel de Dueño</h1>
        <p>Bienvenido a tu panel de control.</p>

        <div class="card-grid">
            <div class="dash-card">
                <span class="dash-icon">🐕</span>
                <h3>Mis Mascotas</h3>
                <p>Gestiona tus mascotas registradas</p>
                <a href="/agregarMascota" class="dash-link">Ir</a>
            </div>
            <div class="dash-card">
                <span class="dash-icon">📅</span>
                <h3>Reservas</h3>
                <p>Administra tus reservas</p>
                <a href="#" class="dash-link">Ir</a>
            </div>
            <div class="dash-card">
                <span class="dash-icon">👨‍⚕️</span>
                <h3>Veterinarios</h3>
                <p>Busca profesionales disponibles</p>
                <a href="#" class="dash-link">Ir</a>
            </div>
        </div>
    </main>
</body>
</html>
