<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare - Postulate</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f0ff, #e8f0fe);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        .card h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
            text-align: center;
        }
        .card > p {
            font-size: 13px;
            color: #888;
            text-align: center;
            margin-bottom: 28px;
        }
        .logo {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .input-group { margin-bottom: 18px; }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
        }
        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8ef;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #fafafe;
            color: #333;
            outline: none;
        }
        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
            background: white;
        }
        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.5);
        }
        .btn-secondary {
            display: inline-block;
            padding: 10px 24px;
            background: #f0f0f5;
            color: #555;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover { background: #e8e8ef; }
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            text-align: center;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .footer-links {
            text-align: center;
            margin-top: 20px;
        }
        .footer-links a {
            color: #667eea;
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
        }
        .footer-links a:hover { color: #764ba2; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🐾 PetCare</div>
        <h1>Trabajá con nosotros</h1>
        <p>Completá el formulario y nos pondremos en contacto</p>

        <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/postular}" method="post">
            <div class="input-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Escribí tu nombre" required>
            </div>

            <div class="input-group">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" name="apellido" placeholder="Escribí tu apellido" required>
            </div>

            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
            </div>

            <div class="input-group">
                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono" name="telefono" placeholder="+54 11 1234-5678">
            </div>

            <div class="input-group">
                <label for="rolSolicitado">Rol al que te postulás</label>
                <select id="rolSolicitado" name="rolSolicitado" required>
                    <option value="">Seleccioná un rol...</option>
                    <option th:each="rol : ${roles}" th:value="${rol.name}" th:text="${rol.name}">VETERINARIO</option>
                </select>
            </div>

            <div class="input-group">
                <label for="experiencia">Experiencia</label>
                <textarea id="experiencia" name="experiencia" placeholder="Contanos sobre tu experiencia laboral y formación"></textarea>
            </div>

            <div class="input-group">
                <label for="descripcion">¿Por qué querés trabajar con nosotros?</label>
                <textarea id="descripcion" name="descripcion" placeholder="Contanos más sobre vos..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Enviar postulación</button>
        </form>

        <div class="footer-links">
            <a href="/">← Volver al inicio</a>
        </div>
    </div>
</body>
</html>
