<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare - Panel Peluquero</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, Arial, sans-serif; background: #f5f5fa; min-height: 100vh; }
        .navbar { background: white; box-shadow: 0 2px 20px rgba(0,0,0,0.08); padding: 0 20px; position: sticky; top: 0; z-index: 100; }
        .nav-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .nav-logo { font-size: 22px; font-weight: 700; color: #302b63; }
        .nav-links { display: flex; align-items: center; gap: 16px; }
        .nav-role { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; }
        .nav-logout { color: #888; text-decoration: none; font-size: 14px; font-weight: 500; }
        .nav-logout:hover { color: #e74c3c; }
        .dashboard { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .dashboard h1 { font-size: 28px; color: #302b63; margin-bottom: 8px; }
        .dashboard > p { color: #888; margin-bottom: 32px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .dash-card { background: white; border-radius: 16px; padding: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); transition: all 0.3s ease; }
        .dash-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .dash-icon { font-size: 36px; display: block; margin-bottom: 16px; }
        .dash-card h3 { font-size: 18px; color: #302b63; margin-bottom: 8px; }
        .dash-card p { font-size: 14px; color: #888; margin-bottom: 20px; }
        .dash-link { display: inline-block; padding: 8px 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; text-decoration: none; border-radius: 10px; font-size: 13px; font-weight: 500; }
        .dash-link:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-logo">🐾 PetCare</div>
            <div class="nav-links">
                <span class="nav-role">Peluquero</span>
                <a href="/logout" class="nav-logout">Cerrar sesión</a>
            </div>
        </div>
    </nav>
    <main class="dashboard">
        <h1>Panel de Peluquero</h1>
        <p>Bienvenido a tu panel de control. Gestioná tus citas y servicios.</p>
        <div class="card-grid">
            <div class="dash-card">
                <span class="dash-icon">✂️</span>
                <h3>Citas</h3>
                <p>Gestioná tus citas de peluquería</p>
                <a href="/reservas" class="dash-link">Ir</a>
            </div>
            <div class="dash-card">
                <span class="dash-icon">🐾</span>
                <h3>Mascotas</h3>
                <p>Consultá el listado de mascotas</p>
                <a href="/mascotas" class="dash-link">Ir</a>
            </div>
            <div class="dash-card">
                <span class="dash-icon">👥</span>
                <h3>Perfil</h3>
                <p>Datos de tu cuenta profesional</p>
                <a href="/sesion" class="dash-link">Ir</a>
            </div>
        </div>
    </main>
</body>
</html>
